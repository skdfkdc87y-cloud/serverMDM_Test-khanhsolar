<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>QR Code</title>

<style>
html { font-size: 13px; }

body {
  margin: 0;
  font-family: "Noto Sans", sans-serif;
  background: url("IMG_8622.jpeg") no-repeat center/cover;
}

/* KHUNG CHUẨN */
.container {
  width: 90vw;
  max-width: 550px;
  margin: 100px auto 0;
  text-align: center;
}

.title {
  color: #f4e4c0;
  font-size: 1.2rem;
  margin-bottom: 18px;
}

.card {
  border-radius: 14px;
  overflow: hidden;
}

.card-header {
  background: #e6b93c;
  color: #fff;
  padding: 12px 10px;
  font-size: 0.95rem;
  position: relative;
}

/* chấm 2 bên */
.card-header::before,
.card-header::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: #3b3d54;
  border-radius: 50%;
  bottom: -6px;
}
.card-header::before { left: -6px; }
.card-header::after { right: -6px; }

.card-body {
  background: #efefef;
  padding: 14px 10px 16px;
}

.time {
  font-size: 0.95rem;
  margin-bottom: 10px;
}

/* QR chuẩn */
.qr {
  width: 82%;
  max-width: 280px;
  aspect-ratio: 1/1;
  display: block;
  margin: 0 auto;
}

.refresh {
  color: #888;
  font-size: 0.8rem;
  margin: 8px 0;
}

.status {
  color: #23c15a;
  font-size: 1.3rem;
}

.countdown {
  color: #23c15a;
  font-size: 1.1rem;
}

.footer {
  color: #f4e4c0;
  font-size: 0.9rem;
  margin-top: 22px;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">V25090035 (Kaelen Nguyen)</div>

  <div class="card">
    
    <div class="card-header">
      将二维码对准扫描器刷码出场
    </div>

    <div class="card-body">
      
      <div class="time" id="time"></div>

      <img src="ewm.gif" class="qr" id="qr">

      <div class="refresh" id="refresh">刷新二维码</div>

      <div class="status">已生效</div>
      <div class="countdown" id="countdown">00:00</div>

    </div>
  </div>

  <div class="footer">
    尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
  </div>

</div>

<script>
/* ===== TIME REAL ===== */
function updateTime(){
  const n=new Date();
  document.getElementById("time").innerText =
    `${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()} ` +
    `${String(n.getHours()).padStart(2,'0')}:` +
    `${String(n.getMinutes()).padStart(2,'0')}:` +
    `${String(n.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateTime,1000);
updateTime();

/* ===== ELAPSED TIME (ĐẾM TĂNG) + RESET 12H ===== */
let startTime = localStorage.getItem("startTime");

if(!startTime){
  startTime = Date.now();
  localStorage.setItem("startTime", startTime);
}else{
  startTime = parseInt(startTime);
}

function updateElapsed(){
  let now = Date.now();
  let diff = Math.floor((now - startTime)/1000);

  // reset sau 12 tiếng
  if(diff >= 12*60*60){
    startTime = now;
    localStorage.setItem("startTime", startTime);
    diff = 0;
  }

  let h = Math.floor(diff / 3600);
  let m = Math.floor((diff % 3600)/60);
  let s = diff % 60;

  document.getElementById("countdown").innerText =
    `${String(h).padStart(2,'0')}:` +
    `${String(m).padStart(2,'0')}:` +
    `${String(s).padStart(2,'0')}`;
}

setInterval(updateElapsed,1000);

/* ===== CLICK 5 RESET ===== */
let clickCount = 0;

document.getElementById("refresh").onclick = ()=>{
  clickCount++;

  if(clickCount >= 5){
    startTime = Date.now();
    localStorage.setItem("startTime", startTime);

    // reload QR
    document.getElementById("qr").src =
      "ewm.gif?t=" + Date.now();

    clickCount = 0;
  }
};
</script>

</body>
</html>
