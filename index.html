<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code</title>

<style>
html {
  font-size: 14px;
}

body {
  margin: 0;
  font-family: "Noto Sans", sans-serif;
  background: url("IMG_8622.jpeg") no-repeat center/cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* KHUNG CHÍNH */
.container {
  width: 100%;
  max-width: 420px;
  padding: 20px 16px;
  text-align: center;
}

/* TIÊU ĐỀ */
.title {
  color: #f4e4c0;
  font-size: 1.4rem;
  margin: 20px 0;
}

/* THẺ QR */
.card {
  border-radius: 12px;
  overflow: hidden;
}

/* HEADER VÀNG */
.card-header {
  background: #f5c542;
  color: #fff;
  padding: 16px;
  font-size: 1rem;
  position: relative;
}

/* 2 CHẤM TRÒN */
.card-header::before,
.card-header::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  background: #3b3d54;
  border-radius: 50%;
  bottom: -7px;
}

.card-header::before {
  left: -7px;
}

.card-header::after {
  right: -7px;
}

/* BODY */
.card-body {
  background: #f2f2f2;
  padding: 16px;
}

/* TIME */
.time {
  font-size: 1rem;
  margin-bottom: 10px;
}

/* QR */
.qr {
  width: 100%;
  max-width: 260px;
  aspect-ratio: 1/1;
  margin: 0 auto;
  display: block;
}

/* REFRESH */
.refresh {
  color: #777;
  font-size: 0.9rem;
  margin: 10px 0;
}

/* STATUS */
.status {
  color: #25c25a;
  font-size: 1.4rem;
  margin-top: 10px;
}

.countdown {
  color: #1db954;
  font-size: 1.1rem;
}

/* FOOTER TEXT */
.footer {
  color: #f4e4c0;
  font-size: 0.9rem;
  margin-top: 20px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">V25090035 (Kaelen Nguyen)</div>

  <div class="card">
    
    <div class="card-header">
      将二维码对准扫描器刷码出场
    </div>

    <div class="card-body">
      
      <div class="time">2026-4-20 09:06:54</div>

      <img src="qr.png" class="qr">

      <div class="refresh">刷新二维码</div>

      <div class="status">已生效</div>
      <div class="countdown">48:29</div>

    </div>
  </div>

  <div class="footer">
    尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
  </div>

</div>

</body>
</html>
